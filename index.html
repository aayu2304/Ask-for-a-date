<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Cutie 💕</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6ea;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(255, 105, 180, 0.2);
            max-width: 400px;
            width: 90%;
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #d63384;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .gif-container img {
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            position: relative;
            height: 50px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
        }

        #noBtn {
            background-color: #6c757d;
            color: white;
            position: relative;
        }

        .hidden {
            display: none !important;
        }

    </style>
</head>
<body>

    <!-- Phase 1: The Question -->
    <div id="questionPage" class="card">
        <div class="gif-container">
            <!-- Cute Milk & Mocha bear gif -->
            <img src="https://media.tenor.com/XFn7n7Egfd0AAAAi/mocha-bear.gif" alt="Cute Bear">
        </div>
        <h1 id="questionText">Will you go out on a date with me? 🌹</h1>
        <div class="btn-container">
            <button id="yesBtn" onclick="showFinalMessage()">Yes! 🥰</button>
            <button id="noBtn" onmouseover="moveNoButton()" onclick="moveNoButton()">No 🥺</button>
        </div>
    </div>

    <!-- Final Confirmation -->
    <div id="successPage" class="card hidden">
        <img src="https://media.tenor.com/gUiu1zywCcgAAAAi/sweet-love.gif" alt="Happy Bear" style="width:150px;">
        <h1>You made the best decision. 💖</h1>
        <p style="font-size: 18px; color: #ff4d6d;">I knew u would choose YES 🌹</p>
    </div>

    <script>
        const noQuotes = [
            "Are you sure, cutie? 🥺",
            "Think again... 💖",
            "Pretty please? 🌹",
            "Surely that was a misclick! 🤔",
            "You're breaking my heart! 💔",
            "Don't do this to me! 😭"
        ];
        
        let quoteIndex = 0;
        const noBtn = document.getElementById('noBtn');
        const questionText = document.getElementById('questionText');

        // Function that runs away and changes the text when "No" is hovered/clicked
        function moveNoButton() {
            // Change text
            questionText.innerText = noQuotes[quoteIndex];
            quoteIndex = (quoteIndex + 1) % noQuotes.length;

            // Move button randomly within the screen bounds
            const padding = 50;
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - padding);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - padding);
            
            // Fix position to absolute relative to viewport so it escapes the card
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function showFinalMessage() {
            document.getElementById('questionPage').classList.add('hidden');
            document.getElementById('successPage').classList.remove('hidden');
        }
    </script>
</body>
</html>
